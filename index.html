     File: login.html - Login Page
     ============================================================ -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iFuelMo - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a5cff;
            --primary-dark: #0f4ad0;
            --bg: #f0f4f8;
            --surface: #ffffff;
            --text-primary: #0b1a33;
            --text-muted: #6b7a8f;
            --border: #eef2f6;
            --shadow: rgba(0,0,0,0.06);
        }
        [data-theme="dark"] {
            --bg: #0d1117;
            --surface: #161b22;
            --text-primary: #e8e8e8;
            --text-muted: #8b9bb0;
            --border: #30363d;
            --shadow: rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s;
        }
        .auth-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px var(--shadow);
            transition: background 0.3s, border-color 0.3s;
        }
        .auth-card .brand {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            text-align: center;
        }
        .auth-card .brand span { color: var(--primary); }
        .auth-card .sub {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
        }
        .auth-card label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .auth-card .form-control {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 60px;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-primary);
            transition: 0.2s;
        }
        .auth-card .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 92, 255, 0.15);
        }
        .auth-card .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 60px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: 0.2s;
        }
        .auth-card .btn-primary:hover { background: var(--primary-dark); transform: scale(1.01); }
        .auth-switch {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-switch span {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }
        .auth-switch span:hover { text-decoration: underline; }
        .error-msg {
            background: #fee9e7;
            color: #b91c1c;
            padding: 10px 14px;
            border-radius: 40px;
            font-size: 13px;
            display: none;
            margin-top: 10px;
        }
        [data-theme="dark"] .error-msg { background: #3a1a1a; color: #ef5350; }
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.2s;
            z-index: 1000;
        }
        .theme-toggle:hover { transform: scale(1.05); }
        .demo-hint {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 12px;
        }
        .demo-hint span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 500;
        }
        .demo-hint span:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="auth-card">
        <div class="brand">⛽ iFuel<span>Mo</span></div>
        <div class="sub">Smart Fuel Monitoring System</div>
        <h2 style="font-size:24px;font-weight:700;color:var(--text-primary);">Welcome Back</h2>
        <div style="color:var(--text-muted);font-size:14px;margin-bottom:16px;">Sign in to your account</div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="loginEmail" placeholder="you@email.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
            </div>
            <div id="loginError" class="error-msg"></div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-arrow-right-to-bracket me-2"></i>Sign In</button>
        </form>
        
        <div class="auth-switch">Don't have an account? <span onclick="window.location.href='register.html'">Create Account</span></div>
        
        <div class="demo-hint">
            <span onclick="fillDemo()">Use Demo Account</span> · 
            <span onclick="fillAdmin()">Admin Demo</span>
        </div>
    </div>

    <script>
        // Theme
        function loadTheme() {
            const saved = localStorage.getItem('ifuelmo_theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            document.getElementById('themeIcon').className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        document.getElementById('themeToggle').addEventListener('click', function() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            document.getElementById('themeIcon').className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('ifuelmo_theme', newTheme);
        });
        loadTheme();

        // Auth
        function getUsers() {
            try {
                const data = localStorage.getItem('ifuelmo_users');
                const users = data ? JSON.parse(data) : [];
                if (!users.find(u => u.email === 'admin@ifuelmo.com')) {
                    users.push({
                        id: 1,
                        name: 'Admin User',
                        email: 'admin@ifuelmo.com',
                        password: 'admin123',
                        contact: '+63 900 000 0000',
                        motorcycle: 'Admin Account',
                        role: 'admin',
                        createdAt: new Date().toISOString()
                    });
                    localStorage.setItem('ifuelmo_users', JSON.stringify(users));
                }
                return users;
            } catch { return []; }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');
            
            if (!email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }
            
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('ifuelmo_currentUser', JSON.stringify(user));
                errorEl.style.display = 'none';
                window.location.href = 'main.html';
            } else {
                errorEl.textContent = 'Invalid email or password. Please try again.';
                errorEl.style.display = 'block';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', handleLogin);

        function fillDemo() {
            document.getElementById('loginEmail').value = 'demo@ifuelmo.com';
            document.getElementById('loginPassword').value = 'demo123';
            const users = getUsers();
            if (!users.find(u => u.email === 'demo@ifuelmo.com')) {
                users.push({
                    id: users.length + 1,
                    name: 'Demo User',
                    email: 'demo@ifuelmo.com',
                    password: 'demo123',
                    contact: '+63 912 345 6789',
                    motorcycle: 'Yamaha Mio Sporty 2023',
                    role: 'user',
                    createdAt: new Date().toISOString()
                });
                localStorage.setItem('ifuelmo_users', JSON.stringify(users));
            }
        }

        function fillAdmin() {
            document.getElementById('loginEmail').value = 'admin@ifuelmo.com';
            document.getElementById('loginPassword').value = 'admin123';
        }

        window.fillDemo = fillDemo;
        window.fillAdmin = fillAdmin;
    </script>
</body>
</html>
