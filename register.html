<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iFuelMo - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a5cff;
            --primary-dark: #0f4ad0;
            --bg: #f0f4f8;
            --surface: #ffffff;
            --text-primary: #0b1a33;
            --text-muted: #6b7a8f;
            --border: #eef2f6;
            --shadow: rgba(0,0,0,0.06);
        }
        [data-theme="dark"] {
            --bg: #0d1117;
            --surface: #161b22;
            --text-primary: #e8e8e8;
            --text-muted: #8b9bb0;
            --border: #30363d;
            --shadow: rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }
        .auth-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 24px 20px;
            max-width: 420px;
            margin: 0 auto;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px var(--shadow);
            transition: background 0.3s, border-color 0.3s;
        }
        .auth-card .brand {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
        }
        .auth-card .brand span { color: var(--primary); }
        .auth-card label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .auth-card .form-control, .auth-card .form-select {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 60px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--text-primary);
        }
        .auth-card .form-control:focus, .auth-card .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 92, 255, 0.15);
        }
        .auth-card .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 60px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: 0.2s;
        }
        .auth-card .btn-primary:hover { background: var(--primary-dark); }
        .auth-switch {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .auth-switch span {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }
        .auth-switch span:hover { text-decoration: underline; }
        .error-msg {
            background: #fee9e7;
            color: #b91c1c;
            padding: 10px 14px;
            border-radius: 40px;
            font-size: 13px;
            display: none;
            margin-top: 10px;
        }
        [data-theme="dark"] .error-msg { background: #3a1a1a; color: #ef5350; }
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.2s;
            z-index: 1000;
        }
        .theme-toggle:hover { transform: scale(1.05); }
        .back-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 18px;
            cursor: pointer;
            padding: 0;
        }
        .back-btn:hover { transform: scale(1.1); }
        @media (max-width: 480px) {
            .auth-card { padding: 16px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="auth-card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
            <div class="brand">⛽ iFuel<span>Mo</span></div>
        </div>
        <h2 style="font-size:22px;font-weight:700;color:var(--text-primary);">Create Account</h2>
        <div style="color:var(--text-muted);font-size:13px;margin-bottom:16px;">Join iFuelMo today</div>
        
        <form id="registerForm">
            <div class="mb-2">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="regName" placeholder="Juan Dela Cruz" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="regEmail" placeholder="you@email.com" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Contact Number</label>
                <input type="text" class="form-control" id="regContact" placeholder="+63 912 345 6789" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="regPassword" placeholder="min 6 characters" required minlength="6">
            </div>
            <div class="mb-2">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="regConfirmPassword" placeholder="••••••••" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Motorcycle Details</label>
                <div class="row g-2">
                    <div class="col-6">
                        <select class="form-select" id="regBrand">
                            <option value="Yamaha">Yamaha</option>
                            <option value="Honda">Honda</option>
                            <option value="Suzuki">Suzuki</option>
                            <option value="Kawasaki">Kawasaki</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <input type="text" class="form-control" id="regModel" placeholder="Model" value="Mio Sporty">
                    </div>
                </div>
                <div class="row g-2 mt-1">
                    <div class="col-6">
                        <select class="form-select" id="regYear">
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023" selected>2023</option>
                            <option value="2022">2022</option>
                            <option value="2021">2021</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <input type="number" class="form-control" id="regTank" placeholder="Tank (L)" value="4.2" step="0.1">
                    </div>
                </div>
            </div>
            <div id="registerError" class="error-msg"></div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-user-plus me-2"></i>Create Account</button>
        </form>
        
        <div class="auth-switch">Already have an account? <span onclick="window.location.href='index.html'">Sign In</span></div>
    </div>

    <script>
        // Theme
        function loadTheme() {
            const saved = localStorage.getItem('ifuelmo_theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            document.getElementById('themeIcon').className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        document.getElementById('themeToggle').addEventListener('click', function() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            document.getElementById('themeIcon').className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('ifuelmo_theme', newTheme);
        });
        loadTheme();

        // Register
        function getUsers() {
            try {
                const data = localStorage.getItem('ifuelmo_users');
                const users = data ? JSON.parse(data) : [];
                if (!users.find(u => u.email === 'admin@ifuelmo.com')) {
                    users.push({
                        id: 1,
                        name: 'Admin User',
                        email: 'admin@ifuelmo.com',
                        password: 'admin123',
                        contact: '+63 900 000 0000',
                        motorcycle: 'Admin Account',
                        role: 'admin',
                        createdAt: new Date().toISOString()
                    });
                    localStorage.setItem('ifuelmo_users', JSON.stringify(users));
                }
                return users;
            } catch { return []; }
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const contact = document.getElementById('regContact').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const brand = document.getElementById('regBrand').value;
            const model = document.getElementById('regModel').value.trim();
            const year = document.getElementById('regYear').value;
            const tank = document.getElementById('regTank').value;
            const errorEl = document.getElementById('registerError');
            
            if (!name || !email || !contact || !password || !confirm || !model || !tank) {
                errorEl.textContent = 'Please fill in all required fields.';
                errorEl.style.display = 'block';
                return;
            }
            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters.';
                errorEl.style.display = 'block';
                return;
            }
            
            const users = getUsers();
            if (users.find(u => u.email === email)) {
                errorEl.textContent = 'Email already registered.';
                errorEl.style.display = 'block';
                return;
            }
            
            users.push({
                id: users.length + 1,
                name: name,
                email: email,
                password: password,
                contact: contact,
                motorcycle: `${brand} ${model} ${year}`,
                tankCapacity: parseFloat(tank),
                role: 'user',
                createdAt: new Date().toISOString()
            });
            localStorage.setItem('ifuelmo_users', JSON.stringify(users));
            errorEl.style.display = 'none';
            alert('Registration successful! Please sign in.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
